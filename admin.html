<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Gloryca International College</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; }
    .header { background: #1A1A2E; color: white; padding: 16px 24px; }
    .header h1 { font-size: 16px; }
    .header span { font-size: 12px; opacity: 0.7; }
    .nav { display: flex; gap: 4px; background: white; padding: 10px 24px; border-bottom: 1px solid #eee; overflow-x: auto; }
    .nav button { background: transparent; color: #555; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .nav button.active { background: #1A1A2E; color: white; }
    .content { padding: 24px; max-width: 800px; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .card h3 { font-size: 15px; margin-bottom: 18px; color: #1A1A2E; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; margin-top: 12px; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button.submit { width: 100%; padding: 11px; background: #1A1A2E; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 18px; }
    button.submit:hover { background: #0f0f1a; }
    .msg { font-size: 13px; margin-top: 10px; text-align: center; }
    .msg.success { color: green; }
    .msg.error { color: red; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    th { text-align: left; padding: 8px 0; border-bottom: 2px solid #eee; color: #666; font-size: 12px; }
    td { padding: 9px 0; border-bottom: 1px solid #f0f0f0; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Gloryca International College</h1>
  <span>Staff Admin Panel</span>
</div>

<nav class="nav">
  <button class="active" onclick="showTab('students')">Students</button>
  <button onclick="showTab('results')">Add Result</button>
  <button onclick="showTab('fees')">Add Fee</button>
  <button onclick="showTab('attendance')">Add Attendance</button>
  <button onclick="showTab('timetable')">Add Timetable</button>
</nav>

<div class="content">

  <div class="section active" id="students">
    <div class="card">
      <h3>Register New Student</h3>
      <label>Student ID</label>
      <input type="text" id="reg-id" placeholder="WC-2024002" />
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="John Doe" />
      <label>Email</label>
      <input type="text" id="reg-email" placeholder="john@college.com" />
      <label>Phone</label>
      <input type="text" id="reg-phone" placeholder="0712345678" />
      <label>Password</label>
      <input type="text" id="reg-password" placeholder="Temporary password" />
      <button class="submit" onclick="registerStudent()">Register Student</button>
      <div id="reg-msg" class="msg"></div>
    </div>

    <div class="card">
      <h3>All Students</h3>
      <div id="students-list">Loading...</div>
    </div>
  </div>

  <div class="section" id="results">
    <div class="card">
      <h3>Add Exam Result</h3>
      <label>Student ID</label>
      <input type="text" id="res-id" placeholder="WC-2024001" />
      <label>Unit Name</label>
      <input type="text" id="res-unit" placeholder="Calculus II" />
      <div class="two-col">
        <div><label>CAT Score</label><input type="number" id="res-cat" placeholder="28" /></div>
        <div><label>Exam Score</label><input type="number" id="res-exam" placeholder="62" /></div>
      </div>
      <div class="two-col">
        <div><label>Total Score</label><input type="number" id="res-total" placeholder="90" /></div>
        <div><label>Grade</label><input type="text" id="res-grade" placeholder="A" /></div>
      </div>
      <label>Semester</label>
      <input type="text" id="res-semester" placeholder="Semester 2" />
      <button class="submit" onclick="addResult()">Add Result</button>
      <div id="res-msg" class="msg"></div>
    </div>
  </div>

  <div class="section" id="fees">
    <div class="card">
      <h3>Add Fee Record</h3>
      <label>Student ID</label>
      <input type="text" id="fee-id" placeholder="WC-2024001" />
      <label>Amount (KSh)</label>
      <input type="number" id="fee-amount" placeholder="85000" />
      <label>Semester</label>
      <input type="text" id="fee-semester" placeholder="Semester 2" />
      <label>Due Date</label>
      <input type="date" id="fee-due" />
      <button class="submit" onclick="addFee()">Add Fee Record</button>
      <div id="fee-msg" class="msg"></div>
    </div>
  </div>

  <div class="section" id="attendance">
    <div class="card">
      <h3>Add / Update Attendance</h3>
      <label>Student ID</label>
      <input type="text" id="att-id" placeholder="WC-2024001" />
      <label>Unit Name</label>
      <input type="text" id="att-unit" placeholder="Calculus II" />
      <div class="two-col">
        <div><label>Classes Attended</label><input type="number" id="att-attended" placeholder="22" /></div>
        <div><label>Total Classes</label><input type="number" id="att-total" placeholder="24" /></div>
      </div>
      <label>Semester</label>
      <input type="text" id="att-semester" placeholder="Semester 2" />
      <button class="submit" onclick="addAttendance()">Save Attendance</button>
      <div id="att-msg" class="msg"></div>
    </div>
  </div>

  <div class="section" id="timetable">
    <div class="card">
      <h3>Add Timetable Entry</h3>
      <label>Unit Name</label>
      <input type="text" id="tt-unit" placeholder="Calculus II" />
      <label>Day</label>
      <select id="tt-day">
        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
        <option>Thursday</option><option>Friday</option><option>Saturday</option>
      </select>
      <div class="two-col">
        <div><label>Start Time</label><input type="time" id="tt-start" /></div>
        <div><label>End Time</label><input type="time" id="tt-end" /></div>
      </div>
      <label>Room</label>
      <input type="text" id="tt-room" placeholder="LH 4" />
      <label>Semester</label>
      <input type="text" id="tt-semester" placeholder="Semester 2" />
      <button class="submit" onclick="addTimetable()">Add Entry</button>
      <div id="tt-msg" class="msg"></div>
    </div>
  </div>

</div>

<script>
  const API = 'https://college-portal-production-4e3e.up.railway.app/api';

  function showTab(tab) {
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'students') loadStudents();
  }

  function showMsg(el, text, ok) {
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'success' : 'error');
  }

  async function registerStudent() {
    var body = {
      student_id: document.getElementById('reg-id').value,
      full_name: document.getElementById('reg-name').value,
      email: document.getElementById('reg-email').value,
      phone: document.getElementById('reg-phone').value,
      password: document.getElementById('reg-password').value
    };
    var msg = document.getElementById('reg-msg');
    try {
      var res = await fetch(API + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      showMsg(msg, res.ok ? 'Student registered!' : data.error, res.ok);
      if (res.ok) loadStudents();
    } catch (e) {
      showMsg(msg, 'Connection error', false);
    }
  }

  async function loadStudents() {
    var el = document.getElementById('students-list');
    try {
      var res = await fetch(API + '/admin/students');
      var data = await res.json();
      if (!data.length) {
        el.innerHTML = '<p style="color:#888;font-size:13px">No students yet.</p>';
        return;
      }
      var rows = '';
      for (var i = 0; i < data.length; i++) {
        var s = data[i];
        rows += '<tr><td>' + s.student_id + '</td><td>' + s.full_name + '</td><td>' + s.email + '</td><td>' + (s.phone || '—') + '</td></tr>';
      }
      el.innerHTML = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th></tr>' + rows + '</table>';
    } catch (e) {
      el.innerHTML = '<p style="color:red;font-size:13px">Could not load students.</p>';
    }
  }

  async function addResult() {
    var body = {
      student_id: document.getElementById('res-id').value,
      unit_name: document.getElementById('res-unit').value,
      cat_score: document.getElementById('res-cat').value,
      exam_score: document.getElementById('res-exam').value,
      total_score: document.getElementById('res-total').value,
      grade: document.getElementById('res-grade').value,
      semester: document.getElementById('res-semester').value
    };
    var msg = document.getElementById('res-msg');
    try {
      var res = await fetch(API + '/admin/results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      showMsg(msg, res.ok ? 'Result added!' : data.error, res.ok);
    } catch (e) {
      showMsg(msg, 'Connection error', false);
    }
  }

  async function addFee() {
    var body = {
      student_id: document.getElementById('fee-id').value,
      amount: document.getElementById('fee-amount').value,
      semester: document.getElementById('fee-semester').value,
      due_date: document.getElementById('fee-due').value
    };
    var msg = document.getElementById('fee-msg');
    try {
      var res = await fetch(API + '/admin/fees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      showMsg(msg, res.ok ? 'Fee record added!' : data.error, res.ok);
    } catch (e) {
      showMsg(msg, 'Connection error', false);
    }
  }

  async function addAttendance() {
    var body = {
      student_id: document.getElementById('att-id').value,
      unit_name: document.getElementById('att-unit').value,
      classes_attended: document.getElementById('att-attended').value,
      total_classes: document.getElementById('att-total').value,
      semester: document.getElementById('att-semester').value
    };
    var msg = document.getElementById('att-msg');
    try {
      var res = await fetch(API + '/admin/attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      showMsg(msg, res.ok ? 'Attendance saved!' : data.error, res.ok);
    } catch (e) {
      showMsg(msg, 'Connection error', false);
    }
  }

  async function addTimetable() {
    var body = {
      unit_name: document.getElementById('tt-unit').value,
      day: document.getElementById('tt-day').value,
      start_time: document.getElementById('tt-start').value,
      end_time: document.getElementById('tt-end').value,
      room: document.getElementById('tt-room').value,
      semester: document.getElementById('tt-semester').value
    };
    var msg = document.getElementById('tt-msg');
    try {
      var res = await fetch(API + '/admin/timetable', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      showMsg(msg, res.ok ? 'Timetable entry added!' : data.error, res.ok);
    } catch (e) {
      showMsg(msg, 'Connection error', false);
    }
  }

  loadStudents();
</script>
</body>
</html>
